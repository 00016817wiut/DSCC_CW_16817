name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: db.sqlite3
      DB_USER: ""
      DB_PASSWORD: ""
      DB_HOST: ""
      DB_PORT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q -p no:cacheprovider

  build_and_push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multi
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/study_planner-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/study_planner-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/study_planner

            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput

            # Wait for web container health first
            WEB_ID=$(docker compose -f docker-compose.prod.yml ps -q web)
            for i in $(seq 1 30); do
              STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$WEB_ID")
              echo "web health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              sleep 3
            done

            # Restart nginx after web recreate
            docker compose -f docker-compose.prod.yml restart nginx

            # Check public endpoint with retries
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1/health/ >/dev/null; then
                echo "health OK"
                exit 0
              fi
              echo "health not ready yet, retry $i"
              sleep 3
            done

            echo "Health check failed"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=100 web
            docker compose -f docker-compose.prod.yml logs --tail=100 nginx
            exit 1
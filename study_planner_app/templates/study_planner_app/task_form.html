{% extends "study_planner_app/base.html" %}

{% block content %}
<h1>{% if form.instance.pk %}Edit Task{% else %}New Task{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    <div style="margin-bottom: 1.5rem;">
        {{ form.as_p }}
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Save Task</button>
</form>
{% endblock %}
